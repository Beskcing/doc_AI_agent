# 应用全局配置
# 所有路径相对于项目根目录

llm:
  default_provider: glm
  providers:
    qwen:
      model: qwen-plus
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      temperature: 0.1
      max_tokens: 4096
    glm:
      model: glm-4
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      temperature: 0.1
      max_tokens: 4096

rag:
  chroma_path: "knowledge_data/chroma_db"
  collection_name: "formatting_standards"
  chunk_size: 700
  chunk_overlap_ratio: 0.15
  embedding_provider: "dashscope"
  embedding_model: "text-embedding-v3"
  top_k: 5
  bm25_weight: 0.3
  vector_weight: 0.7

paths:
  input_dir: "data/input"
  output_dir: "data/output"
  knowledge_data_dir: "knowledge_data"
  raw_docs_dir: "knowledge_data/raw_docs"
  prompts_dir: "prompts"

pandoc:
  executable_path: "pandoc"
  extra_args:
    - "--from=markdown+raw_html"
    - "--to=docx"

mineru:
  mode: "online"              # online（线上API）或 local（本地SDK）
  # api_token 通过 .env 文件中的 MINERU_API_TOKEN 设置
  base_url: "https://mineru.net"
  model_version: "vlm"         # pipeline / vlm / MinerU-HTML
  is_ocr: true
  enable_formula: true
  enable_table: true
  language: "ch"
  poll_interval: 5             # 轮询间隔（秒）
  poll_timeout: 600            # 轮询总超时（秒）
  request_timeout: 120         # HTTP 请求超时（秒）

debug:
  keep_intermediate_files: false  # true 保留 LLM 中间 JSON / full.md，false 自动清理
